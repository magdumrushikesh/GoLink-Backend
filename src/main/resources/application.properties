spring.application.name=golink-backend
spring.profiles.active=local

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/golink}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

server.port=8080
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile